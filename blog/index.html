<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal — Mindworks Counselling</title>
<meta name="description" content="Writing from the Mindworks team — on therapy, mental health, and the quieter things.">
<link rel="stylesheet" href="../css/styles.css">
<style>
/* ── BLOG INDEX ─── */
.blog-hero {
  padding: 5rem 2.5rem 4rem;
  border-bottom: 1px solid var(--border);
  max-width: 1200px; margin: 0 auto;
}
.blog-hero h1 {
  font-family: var(--display);
  font-size: clamp(3rem, 6vw, 5.5rem);
  font-weight: 400; line-height: 1.02;
  letter-spacing: -0.04em; color: var(--ink);
  margin-top: 1rem; margin-bottom: 1.25rem;
}
.blog-hero h1 em { font-style: italic; color: var(--accent); }
.blog-hero-sub {
  font-size: 1rem; color: var(--muted);
  line-height: 1.7; max-width: 480px;
}

.blog-filters {
  max-width: 1200px; margin: 0 auto;
  padding: 1.75rem 2.5rem;
  display: flex; align-items: center; gap: 0.5rem;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.filter-btn {
  padding: 0.4rem 1rem; border-radius: 100px;
  border: 1px solid var(--border); background: transparent;
  font-size: 0.75rem; font-weight: 500; color: var(--muted);
  cursor: pointer; transition: all 0.2s; font-family: var(--body);
}
.filter-btn:hover, .filter-btn.active {
  background: var(--ink); border-color: var(--ink); color: var(--cream);
}

.blog-grid {
  max-width: 1200px; margin: 0 auto;
  padding: 3rem 2.5rem 6rem;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
}

.post-card.featured {
  grid-column: span 3;
  display: grid; grid-template-columns: 5fr 7fr;
  gap: 0;
}

.post-card {
  border: 1px solid var(--border);
  border-radius: 1.5rem; overflow: hidden;
  background: var(--card);
  display: flex; flex-direction: column;
  transition: border-color 0.2s, transform 0.2s;
  text-decoration: none; color: inherit;
}
.post-card:hover { border-color: var(--ink); transform: translateY(-3px); }

.post-thumb {
  aspect-ratio: 16/9;
  background: linear-gradient(135deg, hsl(38,30%,88%), hsl(22,40%,80%));
  display: flex; align-items: flex-end;
  padding: 1.5rem;
  position: relative; overflow: hidden;
}
.post-card.featured .post-thumb { aspect-ratio: auto; min-height: 320px; }
.post-thumb-tag {
  display: inline-flex;
  padding: 0.3rem 0.75rem; border-radius: 100px;
  background: rgba(249,244,235,0.9); backdrop-filter: blur(4px);
  font-size: 0.65rem; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink);
}
.post-thumb::before {
  content: attr(data-num);
  position: absolute; bottom: -0.5rem; right: 1rem;
  font-family: var(--display); font-size: 8rem; font-style: italic;
  color: rgba(26,42,51,0.07); line-height: 1; pointer-events: none;
}

.post-body {
  padding: 1.75rem;
  display: flex; flex-direction: column; gap: 0.65rem;
  flex: 1;
}
.post-meta {
  display: flex; align-items: center; gap: 1rem;
  font-size: 0.68rem; color: var(--muted); letter-spacing: 0.04em;
}
.post-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }
.post-title {
  font-family: var(--display);
  font-size: 1.25rem; font-weight: 400;
  line-height: 1.25; letter-spacing: -0.02em; color: var(--ink);
}
.post-card.featured .post-title { font-size: 1.7rem; }
.post-excerpt {
  font-size: 0.85rem; color: var(--muted); line-height: 1.65;
  flex: 1;
}
.post-link {
  margin-top: 0.5rem;
  display: inline-flex; align-items: center; gap: 0.35rem;
  font-size: 0.78rem; font-weight: 500; color: var(--accent);
  text-decoration: none; transition: gap 0.2s;
}
.post-link svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }
.post-card:hover .post-link { gap: 0.6rem; }

.blog-empty {
  grid-column: span 3; text-align: center;
  padding: 5rem 2rem; color: var(--muted);
}
.blog-empty p { font-family: var(--display); font-size: 1.5rem; font-style: italic; }

@media (max-width: 900px) {
  .blog-hero { padding: 3rem 1.25rem 2.5rem; }
  .blog-filters { padding: 1.25rem 1.25rem; }
  .blog-grid { grid-template-columns: 1fr 1fr; padding: 2rem 1.25rem 4rem; }
  .post-card.featured { grid-column: span 2; grid-template-columns: 1fr; }
  .blog-empty { grid-column: span 2; }
}
@media (max-width: 580px) {
  .blog-grid { grid-template-columns: 1fr; }
  .post-card.featured { grid-column: span 1; }
  .blog-empty { grid-column: span 1; }
}
</style>
</head>
<body>

<div id="mw-sticky-bar"></div>
<div id="mw-nav"></div>
<div id="mw-mobile-island"></div>

<div class="blog-hero reveal">
  <div class="eyebrow"><span class="eyebrow-line"></span>Journal</div>
  <h1>Words worth<br><em>sitting with</em></h1>
  <p class="blog-hero-sub">Writing from the Mindworks team — on therapy, mental health, and the quieter things.</p>
</div>

<div class="blog-filters" id="blog-filters">
  <button class="filter-btn active" data-tag="all">All</button>
</div>

<div class="blog-grid" id="blog-grid">
  <div class="blog-empty"><p>Loading posts…</p></div>
</div>

<div id="mw-footer"></div>

<script src="../js/shared.js"></script>
<script src="../js/content.js"></script>
<script src="../js/blog-content.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (typeof CONTENT === 'undefined' || !CONTENT.blog) return;

  const posts = CONTENT.blog.posts || [];
  const grid = document.getElementById('blog-grid');
  const filtersEl = document.getElementById('blog-filters');
  let activeTag = 'all';

  const tags = [...new Set(posts.map(p => p.tag).filter(Boolean))];
  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.tag = tag;
    btn.textContent = tag;
    btn.addEventListener('click', () => setFilter(tag));
    filtersEl.appendChild(btn);
  });

  function setFilter(tag) {
    activeTag = tag;
    filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.tag === tag));
    renderPosts();
  }

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold: 0.06 });

  function renderPosts() {
    const filtered = activeTag === 'all' ? posts : posts.filter(p => p.tag === activeTag);
    if (!filtered.length) {
      grid.innerHTML = '<div class="blog-empty"><p>Nothing here yet.</p></div>';
      return;
    }
    grid.innerHTML = filtered.map((post, i) => {
      const isFeatured = post.featured && activeTag === 'all';
      return `
        <a href="/${post.slug}" class="post-card${isFeatured ? ' featured' : ''} reveal reveal-d${(i % 4) + 1}">
          <div class="post-thumb" data-num="${String(i + 1).padStart(2,'0')}">
            <span class="post-thumb-tag">${post.tag || 'Article'}</span>
          </div>
          <div class="post-body">
            <div class="post-meta">
              <span>${post.date}</span>
              <span class="post-meta-dot"></span>
              <span>${post.readTime}</span>
              ${post.author ? `<span class="post-meta-dot"></span><span>${post.author}</span>` : ''}
            </div>
            <div class="post-title">${post.title}</div>
            <div class="post-excerpt">${post.excerpt}</div>
            <span class="post-link">
              Read
              <svg viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
            </span>
          </div>
        </a>
      `;
    }).join('');
    grid.querySelectorAll('.reveal').forEach(el => obs.observe(el));
  }

  renderPosts();
});
</script>
</body>
</html>
