<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Mindworks Counselling — A small Pune-based therapy practice. Certified, supervised psychologists. Online sessions across India.">
<title>Mindworks Counselling — Pune & Online</title>
<link rel="stylesheet" href="css/styles.css">
<style>
/* ── PAGE-SPECIFIC: HOMEPAGE ── */

/* HERO */
.hero {
  display: grid; grid-template-columns: 7fr 5fr;
  min-height: 91vh; padding: 0 2.5rem;
  gap: 3rem; align-items: center;
  border-bottom: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.hero-left { padding: 4rem 0; display: flex; flex-direction: column; gap: 2.5rem; }
.hero-h1 {
  font-family: var(--display);
  font-size: clamp(3rem, 5.5vw, 5.2rem);
  font-weight: 400; line-height: 1.02; letter-spacing: -0.03em; color: var(--ink);
}
.hero-h1 em { font-style: italic; color: var(--accent); }
.hero-body {
  font-size: 1.05rem; font-weight: 300; line-height: 1.75;
  color: var(--muted); max-width: 440px;
}
.hero-actions { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }

/* ── HERO RIGHT: TEAM DECK ── */
.hero-right {
  position: relative; display: flex; align-items: center;
  justify-content: center; padding: 3rem 0;
}
.blob {
  position: absolute; width: 340px; height: 380px;
  background: var(--teal-soft);
  border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  animation: blobFloat 9s ease-in-out infinite;
  mix-blend-mode: multiply; z-index: 0;
}
@keyframes blobFloat {
  0%,100%{border-radius:60% 40% 70% 30% / 50% 60% 40% 50%;transform:translate(-50%,-50%) translateY(0)}
  33%{border-radius:50% 50% 40% 60% / 60% 40% 60% 40%;transform:translate(-50%,-50%) translateY(-12px)}
  66%{border-radius:70% 30% 50% 50% / 40% 70% 30% 60%;transform:translate(-50%,-50%) translateY(6px)}
}
.portrait-carousel { position: relative; z-index: 1; width: 280px; }
.portrait-deck {
  position: relative; width: 280px; height: 350px; margin-bottom: 0.5rem;
}
.deck-card {
  position: absolute; inset: 0; width: 280px; height: 350px;
  border-radius: 2rem; overflow: hidden; box-shadow: var(--shadow-soft);
  transform-origin: center bottom; will-change: transform, filter; cursor: pointer;
}
.deck-card-img { width: 100%; height: 100%; position: relative; overflow: hidden; }
.deck-card-placeholder {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-family: var(--display); font-size: 3rem; font-weight: 400; font-style: italic;
  color: rgba(255,255,255,0.75); letter-spacing: -0.02em;
}
.deck-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.deck-card-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 1.5rem 1.25rem 1.25rem;
  background: linear-gradient(to top, rgba(26,42,51,0.82) 0%, transparent 100%);
  color: #fff;
}
.deck-card-name { font-size: 0.82rem; font-weight: 500; color: #fff; letter-spacing: 0.01em; margin-bottom: 0.15rem; }
.deck-card-role { font-size: 0.65rem; color: rgba(255,255,255,0.6); letter-spacing: 0.05em; font-family: var(--body); }
.deck-card-hint {
  position: absolute; top: 1rem; right: 1rem;
  background: rgba(247,246,242,0.18); backdrop-filter: blur(6px);
  border: 1px solid rgba(247,246,242,0.25); border-radius: 100px; padding: 0.3rem 0.65rem;
  font-size: 0.6rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
  color: rgba(255,255,255,0.7); pointer-events: none; opacity: 1; transition: opacity 0.3s;
}
.portrait-deck:hover .deck-card-hint { opacity: 0; }
.carousel-arrow {
  position: absolute; top: calc(175px); transform: translateY(-50%);
  z-index: 10; width: 30px; height: 30px; border-radius: 50%;
  background: rgba(247,246,242,0.92); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 12px rgba(8,104,96,0.12); color: var(--ink); padding: 0;
}
.carousel-arrow:hover { background: var(--teal); color: #fff; transform: translateY(-50%) scale(1.08); box-shadow: 0 4px 16px rgba(8,104,96,0.22); }
.carousel-arrow svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.2; }
.carousel-arrow-prev { left: -18px; }
.carousel-arrow-next { right: -18px; }
.carousel-dots { display: flex; justify-content: center; gap: 0.45rem; margin-top: 1.25rem; }
.carousel-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); border: none; padding: 0; cursor: pointer; transition: background 0.25s, width 0.25s; }
.carousel-dot.active { background: var(--teal); width: 18px; border-radius: 100px; }
.stat-float {
  position: absolute; bottom: 3.5rem; left: -2rem;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 1rem; padding: 1rem 1.25rem; box-shadow: var(--shadow-card); z-index: 2;
}
.stat-float-num { font-family: var(--display); font-size: 1.75rem; font-style: italic; color: var(--ink); line-height: 1; letter-spacing: -0.02em; }
.stat-float-label { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; }
.hero-ticker {
  position: absolute; top: 2rem; right: 0;
  background: var(--ink); color: rgba(249,244,235,0.7);
  font-size: 0.68rem; font-weight: 400; letter-spacing: 0.06em;
  padding: 0.4rem 0.85rem; border-radius: 100px 0 0 100px;
  display: flex; align-items: center; gap: 0.5rem; z-index: 2;
}
.ticker-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* APPROACH */
.approach {
  padding: 6rem 2.5rem; border-bottom: 1px solid var(--border);
  display: grid; grid-template-columns: 5fr 7fr; gap: 4rem; align-items: start;
}
.approach-right {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
  background: var(--border); border: 1px solid var(--border);
  border-radius: 1.5rem; overflow: hidden;
}
.approach-card { background: var(--card); padding: 1.75rem; transition: background 0.2s; cursor: default; }
.approach-card:hover { background: var(--ink); color: var(--cream); }
.approach-card:hover .ac-num, .approach-card:hover .ac-body { color: rgba(249,244,235,0.55); }
.approach-card:hover .ac-title { color: var(--cream); }
.ac-num { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.5rem; transition: color 0.2s; }
.ac-title { font-family: var(--display); font-size: 1.3rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1.25; color: var(--ink); margin-bottom: 0.6rem; transition: color 0.2s; }
.ac-body { font-size: 0.8rem; line-height: 1.65; color: var(--muted); transition: color 0.2s; }
.approach-left h2 { font-family: var(--display); font-size: clamp(2rem,3.5vw,3rem); font-weight: 400; line-height: 1.1; letter-spacing: -0.03em; color: var(--ink); margin-top: 0.75rem; }
.approach-left p { font-size: 0.85rem; color: var(--muted); line-height: 1.75; margin-top: 1.25rem; max-width: 280px; }

/* TOPICS / BENTO */
.topics { padding: 6rem 2.5rem; border-bottom: 1px solid var(--border); }
.topics-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem; }
.topics-header h2 { font-family: var(--display); font-size: clamp(2rem,3.5vw,3rem); font-weight: 400; line-height: 1.1; letter-spacing: -0.03em; color: var(--ink); margin-top: 0.75rem; }
.bento {
  display: grid; grid-template-columns: repeat(4,1fr);
  grid-auto-rows: minmax(120px, auto); gap: 1px;
  background: var(--border); border: 1px solid var(--border);
  border-radius: 1.5rem; overflow: hidden;
}
.bento-cell {
  background: var(--card); padding: 1.5rem;
  display: flex; flex-direction: column; justify-content: flex-end;
  transition: background 0.25s; cursor: default;
}
.bento-cell:hover { background: var(--ink); }
.bento-cell:hover .bc-text { color: var(--cream); }
.bento-cell:hover .bc-num { color: rgba(249,244,235,0.3); }
.bento-large { grid-column: span 2; grid-row: span 2; }
.bc-num { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; transition: color 0.2s; }
.bc-text { font-family: var(--display); font-size: 1.05rem; font-weight: 400; font-style: italic; line-height: 1.3; color: var(--ink); transition: color 0.2s; }
.bento-large .bc-text { font-size: 1.6rem; }

/* THERAPISTS */
.therapists { background: var(--ink); color: var(--cream); padding: 6rem 2.5rem; border-bottom: 1px solid rgba(249,244,235,0.08); }
.therapists .eyebrow { color: rgba(249,244,235,0.35); }
.therapists .eyebrow-line { background: var(--accent); }
.therapists-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem; }
.therapists-h { font-family: var(--display); font-size: clamp(2.2rem,4vw,3.5rem); font-weight: 400; line-height: 1.05; letter-spacing: -0.03em; color: var(--cream); margin-top: 0.75rem; }
.therapists-h em { font-style: italic; color: var(--accent); }
.t-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.25rem; }
.t-card { background: rgba(249,244,235,0.05); border: 1px solid rgba(249,244,235,0.1); border-radius: 1.5rem; overflow: hidden; transition: background 0.2s, border-color 0.2s; cursor: pointer; }
.t-card:hover { background: rgba(249,244,235,0.09); border-color: rgba(249,244,235,0.2); }
.t-card:nth-child(2), .t-card:nth-child(4) { margin-top: 1.5rem; }
.t-img { aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-size: 2rem; font-style: italic; color: rgba(249,244,235,0.5); background: rgba(249,244,235,0.04); border-bottom: 1px solid rgba(249,244,235,0.08); overflow: hidden; }
.t-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.t-body { padding: 1.25rem 1.25rem 1.4rem; }
.t-name { font-weight: 500; font-size: 0.92rem; margin-bottom: 0.3rem; color: var(--cream); }
.t-spec { font-size: 0.75rem; color: rgba(249,244,235,0.45); line-height: 1.55; margin-bottom: 1rem; }
.t-foot { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(249,244,235,0.08); padding-top: 0.85rem; }
.t-exp { font-size: 0.68rem; color: rgba(249,244,235,0.3); }
.t-price { font-family: var(--display); font-size: 1rem; font-style: italic; color: var(--cream); }

/* ASSESSMENTS */
.assess { padding: 6rem 2.5rem; border-bottom: 1px solid var(--border); }
.assess-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem; }
.assess-top h2 { font-family: var(--display); font-size: clamp(2rem,3.5vw,3rem); font-weight: 400; line-height: 1.1; letter-spacing: -0.03em; color: var(--ink); margin-top: 0.75rem; }
.assess-sub { font-size: 0.82rem; color: var(--muted); max-width: 260px; text-align: right; line-height: 1.65; }
.assess-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1.25rem; max-width: 720px; }
.assess-card { border: 1px solid var(--border); border-radius: 1.5rem; background: var(--card); padding: 2rem 1.75rem; display: flex; flex-direction: column; gap: 0.85rem; transition: border-color 0.2s, transform 0.2s; cursor: pointer; }
.assess-card:hover { border-color: var(--ink); transform: translateY(-3px); }
.assess-q { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
.assess-title { font-family: var(--display); font-size: 1.4rem; font-weight: 400; font-style: italic; line-height: 1.2; letter-spacing: -0.02em; color: var(--ink); }
.assess-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.65; }
.assess-link { margin-top: auto; font-size: 0.78rem; font-weight: 500; color: var(--accent); text-decoration: none; display: inline-flex; align-items: center; gap: 0.35rem; transition: gap 0.2s; background: none; border: none; cursor: pointer; padding: 0; font-family: var(--body); }
.assess-link:hover { gap: 0.6rem; }
.assess-link svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }

/* PULL QUOTE */
.pull-quote {
  padding: 6rem 2.5rem; border-bottom: 1px solid var(--border);
  background: hsl(176,20%,93%);
  display: grid; grid-template-columns: 4fr 8fr; gap: 4rem; align-items: center;
}
.pq-label { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.pq-accent-line { width: 30px; height: 1px; background: var(--accent); margin-top: 1rem; }
.pq-text { font-family: var(--display); font-size: clamp(1.5rem,2.5vw,2.2rem); font-weight: 300; font-style: italic; line-height: 1.4; letter-spacing: -0.02em; color: var(--ink); }
.pq-attr { margin-top: 1.5rem; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

/* LOCATIONS */
.locations { padding: 6rem 2.5rem; border-bottom: 1px solid var(--border); }
.locations-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem; }
.locations-top h2 { font-family: var(--display); font-size: clamp(2rem,3.5vw,3rem); font-weight: 400; line-height: 1.1; letter-spacing: -0.03em; color: var(--ink); margin-top: 0.75rem; }
.locations-sub { font-size: 0.82rem; color: var(--muted); max-width: 260px; text-align: right; line-height: 1.65; }
.locations-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.25rem; }
.loc-card { border: 1px solid var(--border); border-radius: 1.5rem; background: var(--card); overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
.loc-card:hover { border-color: var(--teal-20); transform: translateY(-3px); }
.loc-map { aspect-ratio: 16/9; background: var(--teal-soft); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); overflow: hidden; position: relative; }
.loc-map-pin { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
.loc-map-pin svg { width: 32px; height: 32px; stroke: var(--teal); fill: none; stroke-width: 1.5; }
.loc-map-label { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal); }
.loc-map-pulse { position: absolute; width: 12px; height: 12px; border-radius: 50%; background: var(--teal); opacity: 0.35; animation: locPulse 2.5s ease-in-out infinite; }
@keyframes locPulse { 0%,100% { transform: scale(1); opacity: 0.35; } 50% { transform: scale(2.5); opacity: 0; } }
.loc-body { padding: 1.5rem 1.5rem 1.75rem; display: flex; flex-direction: column; gap: 1rem; }
.loc-tag { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.62rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--teal); background: var(--teal-soft); padding: 0.3rem 0.7rem; border-radius: 100px; align-self: flex-start; }
.loc-tag-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--teal); }
.loc-name { font-family: var(--display); font-size: 1.3rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1.2; color: var(--ink); }
.loc-address { font-size: 0.8rem; color: var(--muted); line-height: 1.7; }
.loc-details { display: flex; flex-direction: column; gap: 0.45rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
.loc-detail { display: flex; align-items: flex-start; gap: 0.6rem; font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
.loc-detail svg { width: 14px; height: 14px; stroke: var(--teal); fill: none; stroke-width: 1.5; flex-shrink: 0; margin-top: 1px; }
.loc-actions { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.25rem; flex-wrap: wrap; }
.loc-directions { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; font-weight: 500; color: var(--teal); text-decoration: none; transition: gap 0.2s; }
.loc-directions:hover { gap: 0.65rem; }
.loc-directions svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

/* FOOTER CTA */
.footer-cta { padding: 7rem 2.5rem 6rem; background: var(--ink); text-align: center; position: relative; overflow: hidden; }
.fcta-bg { position: absolute; bottom: -4rem; left: 50%; transform: translateX(-50%); font-family: var(--display); font-size: 17vw; font-style: italic; font-weight: 400; color: rgba(249,244,235,0.04); white-space: nowrap; pointer-events: none; letter-spacing: -0.04em; line-height: 1; }
.fcta-eyebrow { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(249,244,235,0.3); margin-bottom: 1.5rem; }
.fcta-h { font-family: var(--display); font-size: clamp(3rem,6vw,5.5rem); font-weight: 400; font-style: italic; line-height: 1.05; letter-spacing: -0.04em; color: var(--cream); margin-bottom: 0.5rem; position: relative; z-index: 1; }
.fcta-h em { color: var(--accent); }
.fcta-sub { font-size: 0.95rem; font-weight: 300; color: rgba(249,244,235,0.45); line-height: 1.7; margin-bottom: 2.5rem; position: relative; z-index: 1; }
.fcta-actions { display: flex; gap: 1rem; justify-content: center; position: relative; z-index: 1; flex-wrap: wrap; }

/* MOBILE */
@media (max-width: 900px) {
  .hero { grid-template-columns: 1fr; min-height: auto; padding: 2rem 1.25rem; gap: 1.5rem; }
  .hero-right { display: flex; padding: 1rem 0 2.5rem; overflow: visible; }
  .portrait-carousel { margin: 0 auto; }
  .portrait-deck { width: 240px; height: 300px; }
  .deck-card { width: 240px; height: 300px; }
  .stat-float { bottom: 1rem; left: -0.25rem; }
  .hero-ticker { top: 1rem; }
  .approach { grid-template-columns: 1fr; padding: 4rem 1.25rem; }
  .approach-right { grid-template-columns: 1fr; }
  .topics { padding: 4rem 1.25rem; }
  .bento { grid-template-columns: repeat(2,1fr); }
  .therapists { padding: 4rem 1.25rem; }
  .t-grid { grid-template-columns: repeat(2,1fr); }
  .t-card:nth-child(2), .t-card:nth-child(4) { margin-top: 0; }
  .assess { padding: 4rem 1.25rem; }
  .assess-top { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
  .assess-sub { text-align: left; }
  .assess-grid { grid-template-columns: 1fr; max-width: 100%; }
  .pull-quote { grid-template-columns: 1fr; padding: 4rem 1.25rem; }
  .locations { padding: 4rem 1.25rem; }
  .locations-top { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
  .locations-sub { text-align: left; }
  .locations-grid { grid-template-columns: 1fr; }
  .footer-cta { padding: 5rem 1.25rem; }
  .fcta-actions { flex-direction: column; align-items: center; }
}
@media (max-width: 600px) {
  .t-grid { grid-template-columns: 1fr; }
  .bento { grid-template-columns: 1fr 1fr; }
  .bento-large { grid-column: span 2; }
  .hero-left { gap: 1.5rem; }
  .topics-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
}
</style>
</head>
<body>

<!-- SHARED: sticky bar injected here -->
<div id="mw-sticky-bar"></div>

<!-- SHARED: desktop nav + mobile menu injected here -->
<div id="mw-nav"></div>

<!-- SHARED: mobile floating island injected here -->
<div id="mw-mobile-island"></div>

<!-- HERO -->
<section class="hero">
  <div class="hero-left">
    <div class="eyebrow">
      <span class="eyebrow-line"></span>
      <span class="eyebrow-text"></span>
    </div>
    <h1 class="hero-h1"></h1>
    <p class="hero-body"></p>
    <div class="hero-actions">
      <a href="#" class="btn-primary" target="_blank" rel="noopener">
        <span></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
      </a>
      <a href="#therapists" class="btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
      </a>
    </div>
  </div>
  <div class="hero-right">
    <div class="blob"></div>
    <div class="portrait-carousel" id="heroCarousel">
      <div class="portrait-deck" id="carouselDeck">
        <!-- Cards injected by main.js reading CONTENT.hero.deckCards -->
      </div>
      <button class="carousel-arrow carousel-arrow-prev" id="carouselPrev" aria-label="Previous team member">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="carousel-arrow carousel-arrow-next" id="carouselNext" aria-label="Next team member">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="carousel-dots" id="carouselDots"></div>
    </div>
    <div class="stat-float">
      <div class="stat-float-num"></div>
      <div class="stat-float-label"></div>
    </div>
    <div class="hero-ticker">
      <span class="ticker-dot"></span>
      <span class="hero-ticker-text"></span>
    </div>
  </div>
</section>

<!-- MARQUEE -->
<div class="marquee-wrap" aria-hidden="true">
  <div class="marquee-track"></div>
</div>
